<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0e0e14">
<meta name="apple-mobile-web-app-title" content="Lark Player">
<title>Lark Player</title>

<!-- PWA Manifest inline -->
<script>
const manifest = {
  name: "Lark Player",
  short_name: "Lark",
  description: "Reproductor de música estilo Lark Player",
  start_url: ".",
  display: "standalone",
  background_color: "#0e0e14",
  theme_color: "#7c5cfc",
  orientation: "portrait",
  icons: [
    { src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='40' fill='%230e0e14'/><text y='130' x='96' text-anchor='middle' font-size='110'>🎵</text></svg>", sizes: "192x192", type: "image/svg+xml" }
  ]
};
const blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
const manifestURL = URL.createObjectURL(blob);
document.addEventListener('DOMContentLoaded', () => {
  const link = document.createElement('link');
  link.rel = 'manifest'; link.href = manifestURL;
  document.head.appendChild(link);
});
</script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&family=Nunito+Sans:wght@300;400;600&display=swap');

  :root {
    --bg: #0e0e14;
    --surface: #16161f;
    --card: #1c1c2a;
    --border: #2a2a3d;
    --accent: #7c5cfc;
    --accent2: #c35cfc;
    --text: #f0f0ff;
    --subtext: #8888aa;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%; width: 100%;
    overflow: hidden;
    touch-action: manipulation;
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bottom);
    overscroll-behavior: none;
    -webkit-overflow-scrolling: touch;
  }

  /* TOP BAR */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px 10px;
    flex-shrink: 0;
    background: var(--bg);
  }
  .topbar-title { font-size: 20px; font-weight: 800; color: var(--text); letter-spacing: -.3px; }
  .topbar-icons { display: flex; gap: 18px; }
  .topbar-icons label, .topbar-icons span {
    display: flex; align-items: center; justify-content: center;
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--card); cursor: pointer;
    transition: background .2s;
  }
  .topbar-icons label:active, .topbar-icons span:active { background: var(--border); }
  .topbar-icons svg { width: 20px; height: 20px; fill: var(--subtext); }

  /* TABS */
  .tabs {
    display: flex;
    padding: 0 16px;
    gap: 4px;
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    padding: 10px 18px;
    font-size: 13px; font-weight: 700;
    color: var(--subtext);
    cursor: pointer;
    border-radius: 8px 8px 0 0;
    transition: all .2s;
    position: relative;
  }
  .tab.active { color: var(--accent); }
  .tab.active::after {
    content: '';
    position: absolute; bottom: -1px; left: 50%; transform: translateX(-50%);
    width: 60%; height: 2px;
    background: var(--accent); border-radius: 2px 2px 0 0;
  }

  /* MAIN */
  .main { flex: 1; overflow: hidden; display: flex; flex-direction: column; min-height: 0; }

  /* NOW PLAYING */
  #view-player {
    flex: 1; display: none; flex-direction: column;
    align-items: center; padding: 12px 24px 0;
    overflow: hidden; min-height: 0;
  }
  #view-player.active { display: flex; }

  .visualizer {
    display: flex; align-items: flex-end; gap: 2px;
    height: 20px; margin-bottom: 10px; flex-shrink: 0;
  }
  .bar {
    width: 3px; background: linear-gradient(to top, var(--accent), var(--accent2));
    border-radius: 2px;
    animation: barAnim var(--dur,.8s) ease-in-out infinite alternate paused;
  }
  .bar.playing { animation-play-state: running; }
  @keyframes barAnim { from { height: 3px; } to { height: var(--max,20px); } }

  .album-wrapper {
    position: relative;
    width: min(200px, 42vw);
    height: min(200px, 42vw);
    flex-shrink: 0; margin-bottom: 14px;
  }
  .album-glow {
    position: absolute; inset: -18px; border-radius: 50%;
    background: radial-gradient(circle, rgba(124,92,252,.4) 0%, transparent 70%);
    animation: glowPulse 3s ease-in-out infinite;
  }
  @keyframes glowPulse { 0%,100%{opacity:.6;transform:scale(1)} 50%{opacity:1;transform:scale(1.1)} }
  .album-art {
    width: 100%; height: 100%; border-radius: 50%;
    border: 3px solid rgba(124,92,252,.4);
    box-shadow: 0 8px 40px rgba(0,0,0,.7);
    animation: spin 20s linear infinite paused;
    overflow: hidden; display: flex; align-items: center; justify-content: center;
  }
  .album-art.playing { animation-play-state: running; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .album-art-inner {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 60px;
    background: linear-gradient(135deg, #1c1c2a, #2a1f5a, #7c2fa0, #1c1c2a);
  }
  .album-disc {
    position: absolute; width: 30%; height: 30%;
    top: 50%; left: 50%; transform: translate(-50%,-50%);
    background: radial-gradient(circle, #2a2a3d 30%, transparent 31%, transparent 45%, #2a2a3d 46%);
    border-radius: 50%; pointer-events: none;
  }

  .song-info { text-align: center; margin-bottom: 10px; width: 100%; flex-shrink: 0; }
  .song-title {
    font-size: 18px; font-weight: 800;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 3px;
  }
  .song-artist { font-size: 13px; color: var(--subtext); font-weight: 600; }

  .actions-row {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%; margin-bottom: 8px; flex-shrink: 0;
  }
  .action-btn {
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--card); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .2s; flex-shrink: 0;
  }
  .action-btn:active { background: var(--border); transform: scale(.92); }
  .action-btn svg { width: 20px; height: 20px; fill: var(--subtext); transition: fill .2s; }
  .action-btn.liked svg { fill: #fc5c7d; }

  .progress-area { width: 100%; margin-bottom: 10px; flex-shrink: 0; }
  .progress-bar {
    width: 100%; height: 5px; background: var(--border);
    border-radius: 5px; cursor: pointer; position: relative;
    margin-bottom: 6px; touch-action: none;
  }
  .progress-fill {
    height: 100%; border-radius: 5px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width .1s linear; position: relative;
  }
  .progress-fill::after {
    content: ''; position: absolute; right: -7px; top: 50%;
    transform: translateY(-50%);
    width: 14px; height: 14px; background: white; border-radius: 50%;
    box-shadow: 0 0 8px rgba(124,92,252,.9);
  }
  .time-row {
    display: flex; justify-content: space-between;
    font-size: 11px; color: var(--subtext); font-family: 'Nunito Sans', sans-serif;
  }

  .controls {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%; margin-bottom: 10px; flex-shrink: 0;
  }
  .ctrl-btn {
    width: 48px; height: 48px; border-radius: 50%;
    background: none; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s;
  }
  .ctrl-btn:active { background: var(--card); transform: scale(.9); }
  .ctrl-btn svg { width: 24px; height: 24px; fill: var(--subtext); }
  .ctrl-btn.active svg { fill: var(--accent); }

  .play-btn {
    width: 64px; height: 64px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 24px rgba(124,92,252,.6);
    transition: transform .15s, box-shadow .15s; flex-shrink: 0;
  }
  .play-btn:active { transform: scale(.93); box-shadow: 0 2px 12px rgba(124,92,252,.4); }
  .play-btn svg { width: 28px; height: 28px; fill: white; margin-left: 3px; }
  .play-btn.playing svg { margin-left: 0; }

  .volume-row {
    display: flex; align-items: center; gap: 10px;
    width: 100%; flex-shrink: 0;
  }
  .volume-row svg { width: 18px; height: 18px; fill: var(--subtext); flex-shrink: 0; }
  .volume-slider {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 4px; border-radius: 4px; outline: none; cursor: pointer;
    background: linear-gradient(90deg, var(--accent) var(--vol,70%), var(--border) var(--vol,70%));
  }
  .volume-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 18px; height: 18px;
    border-radius: 50%; background: white;
    box-shadow: 0 0 6px rgba(124,92,252,.8);
  }

  /* SONG LIST */
  #view-list {
    flex: 1; overflow-y: auto; padding: 8px 0;
    display: none; -webkit-overflow-scrolling: touch;
  }
  #view-list.active { display: block; }

  .song-item {
    display: flex; align-items: center;
    padding: 12px 16px; gap: 12px; cursor: pointer;
    transition: background .15s; border-radius: 12px; margin: 2px 8px;
    min-height: 64px;
  }
  .song-item:active { background: var(--card); }
  .song-item.playing { background: rgba(124,92,252,.12); }
  .song-item-thumb {
    width: 48px; height: 48px; border-radius: 12px; flex-shrink: 0;
    background: linear-gradient(135deg, #2a1f5a, #1c1c2a);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; position: relative; overflow: hidden;
  }
  .song-item-info { flex: 1; overflow: hidden; }
  .song-item-title {
    font-size: 14px; font-weight: 700;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .song-item.playing .song-item-title { color: var(--accent); }
  .song-item-artist { font-size: 12px; color: var(--subtext); margin-top: 2px; }
  .song-item-dur { font-size: 12px; color: var(--subtext); font-family: 'Nunito Sans'; flex-shrink: 0; }

  #view-list::-webkit-scrollbar { display: none; }

  .upload-hint {
    text-align: center; padding: 40px 20px;
    color: var(--subtext); font-size: 14px;
  }
  .upload-btn {
    display: inline-flex; align-items: center; gap: 8px;
    margin-top: 16px; padding: 14px 24px;
    background: rgba(124,92,252,.15); border: 1.5px dashed var(--accent);
    border-radius: 14px; color: var(--accent); font-weight: 700; font-size: 14px;
    cursor: pointer; font-family: 'Nunito';
  }
  #fileInput { display: none; }

  /* BOTTOM NAV */
  .bottom-nav {
    display: flex; justify-content: space-around; align-items: center;
    padding: 10px 0 12px;
    border-top: 1px solid var(--border);
    flex-shrink: 0; background: var(--bg);
  }
  .nav-item {
    display: flex; flex-direction: column; align-items: center;
    gap: 3px; cursor: pointer; padding: 4px 12px;
    color: var(--subtext); font-size: 10px; font-weight: 700;
    transition: color .2s; border-radius: 12px; min-width: 56px;
  }
  .nav-item:active { background: var(--card); }
  .nav-item.active { color: var(--accent); }
  .nav-item svg { width: 24px; height: 24px; fill: currentColor; }

  /* mini EQ */
  .mini-eq { display: flex; align-items: flex-end; gap: 2px; height: 16px; }
  .mini-bar {
    width: 3px; background: var(--accent); border-radius: 1px; height: 4px;
    animation: miniBar var(--d,.5s) ease-in-out infinite alternate paused;
  }
  .song-item.playing .mini-bar { animation-play-state: running; }
  @keyframes miniBar { to { height: var(--h,12px); } }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">🎵 Lark Player</div>
  <div class="topbar-icons">
    <label for="fileInput" title="Agregar música">
      <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
    </label>
    <span title="Buscar">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
    </span>
  </div>
</div>
<input type="file" id="fileInput" accept="audio/*" multiple>

<div class="tabs">
  <div class="tab active" data-tab="player">Reproduciendo</div>
  <div class="tab" data-tab="list">Canciones</div>
</div>

<div class="main">
  <!-- NOW PLAYING -->
  <div id="view-player" class="active">
    <div class="visualizer" id="visualizer"></div>
    <div class="album-wrapper">
      <div class="album-glow"></div>
      <div class="album-art" id="albumArt">
        <div class="album-art-inner" id="albumEmoji">🎵</div>
      </div>
      <div class="album-disc"></div>
    </div>
    <div class="song-info">
      <div class="song-title" id="songTitle">Sin canción</div>
      <div class="song-artist" id="songArtist">Toca + para agregar música</div>
    </div>
    <div class="actions-row">
      <button class="action-btn" id="likeBtn">
        <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
      </button>
      <div style="font-size:11px;color:var(--subtext);font-weight:700;letter-spacing:1px;">REPRODUCIENDO</div>
      <button class="action-btn" id="moreBtn">
        <svg viewBox="0 0 24 24"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
      </button>
    </div>
    <div class="progress-area">
      <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="time-row">
        <span id="currentTime">0:00</span>
        <span id="totalTime">0:00</span>
      </div>
    </div>
    <div class="controls">
      <button class="ctrl-btn" id="shuffleBtn">
        <svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
      </button>
      <button class="ctrl-btn" id="prevBtn">
        <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
      </button>
      <button class="play-btn paused" id="playBtn">
        <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="ctrl-btn" id="nextBtn">
        <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z"/></svg>
      </button>
      <button class="ctrl-btn" id="repeatBtn">
        <svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
      </button>
    </div>
    <div class="volume-row">
      <svg viewBox="0 0 24 24"><path d="M18.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM5 9v6h4l5 5V4L9 9H5z"/></svg>
      <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="70">
      <svg viewBox="0 0 24 24" style="opacity:.3"><path d="M3 9v6h4l5 5V4L7 9H3z"/></svg>
    </div>
  </div>

  <!-- SONG LIST -->
  <div id="view-list">
    <div class="upload-hint" id="emptyHint">
      <div style="font-size:48px;margin-bottom:12px;">🎶</div>
      <div>No hay canciones todavía</div>
      <label for="fileInput" class="upload-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        Agregar música
      </label>
    </div>
    <div id="songList"></div>
  </div>
</div>

<div class="bottom-nav">
  <div class="nav-item active" data-nav="player">
    <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
    Música
  </div>
  <div class="nav-item" data-nav="list">
    <svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
    Lista
  </div>
  <div class="nav-item" data-nav="fav">
    <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
    Favoritos
  </div>
  <div class="nav-item" data-nav="eq">
    <svg viewBox="0 0 24 24"><path d="M10 20h4V4h-4v16zm-6 0h4v-8H4v8zM16 9v11h4V9h-4z"/></svg>
    Ecualizador
  </div>
</div>

<audio id="audio"></audio>

<script>
// Prevent bounce scroll on iOS/Android WebView
document.body.addEventListener('touchmove', e => { if(e.target === document.body) e.preventDefault(); }, {passive:false});

const audio = document.getElementById('audio');
const playBtn = document.getElementById('playBtn');
const playIcon = document.getElementById('playIcon');
const progressFill = document.getElementById('progressFill');
const progressBar = document.getElementById('progressBar');
const currentTimeEl = document.getElementById('currentTime');
const totalTimeEl = document.getElementById('totalTime');
const songTitle = document.getElementById('songTitle');
const songArtist = document.getElementById('songArtist');
const albumArt = document.getElementById('albumArt');
const albumEmoji = document.getElementById('albumEmoji');
const songListEl = document.getElementById('songList');
const emptyHint = document.getElementById('emptyHint');
const volumeSlider = document.getElementById('volumeSlider');
const likeBtn = document.getElementById('likeBtn');
const shuffleBtn = document.getElementById('shuffleBtn');
const repeatBtn = document.getElementById('repeatBtn');
const fileInput = document.getElementById('fileInput');

let songs = [], currentIndex = 0, shuffle = false, repeat = false;
let liked = new Set();
const emojis = ['🎵','🎶','🎸','🎹','🎺','🎻','🥁','🎷','🎼','🔊'];

// Visualizer
const viz = document.getElementById('visualizer');
for (let i = 0; i < 26; i++) {
  const b = document.createElement('div');
  b.className = 'bar';
  const maxH = Math.floor(Math.random() * 16) + 5;
  const dur = (Math.random() * 0.4 + 0.25).toFixed(2);
  b.style.cssText = `--max:${maxH}px;--dur:${dur}s;height:3px;animation-delay:${(Math.random()*.5).toFixed(2)}s`;
  viz.appendChild(b);
}

const fmt = s => { const m=Math.floor(s/60),sec=Math.floor(s%60); return `${m}:${sec.toString().padStart(2,'0')}`; };

function loadSong(i) {
  currentIndex = i;
  const s = songs[i];
  audio.src = s.url;
  songTitle.textContent = s.name;
  songArtist.textContent = s.artist || 'Artista desconocido';
  albumEmoji.textContent = emojis[i % emojis.length];
  likeBtn.classList.toggle('liked', liked.has(i));
  renderList();
}

function playSong(i) { loadSong(i); audio.play(); }

function renderList() {
  emptyHint.style.display = songs.length ? 'none' : 'block';
  songListEl.innerHTML = songs.map((s,i) => `
    <div class="song-item ${i===currentIndex?'playing':''}" data-i="${i}">
      <div class="song-item-thumb">${emojis[i%emojis.length]}
        ${i===currentIndex ? `<div style="position:absolute;inset:0;border-radius:12px;background:rgba(124,92,252,.4);display:flex;align-items:center;justify-content:center;">
          <div class="mini-eq">
            <div class="mini-bar" style="--d:.4s;--h:14px"></div>
            <div class="mini-bar" style="--d:.6s;--h:10px"></div>
            <div class="mini-bar" style="--d:.5s;--h:16px"></div>
          </div></div>` : ''}
      </div>
      <div class="song-item-info">
        <div class="song-item-title">${s.name}</div>
        <div class="song-item-artist">${s.artist||'Artista desconocido'}</div>
      </div>
      <div class="song-item-dur">${s.dur||'--:--'}</div>
    </div>`).join('');
  songListEl.querySelectorAll('.song-item').forEach(el =>
    el.addEventListener('click', () => playSong(parseInt(el.dataset.i)))
  );
}

// File input
fileInput.addEventListener('change', e => {
  Array.from(e.target.files).forEach(file => {
    if (!file.type.startsWith('audio/')) return;
    const url = URL.createObjectURL(file);
    const name = file.name.replace(/\.[^.]+$/,'');
    const idx = songs.length;
    songs.push({name, url, artist:'', dur:''});
    const tmp = new Audio(url);
    tmp.addEventListener('loadedmetadata', () => { songs[idx].dur = fmt(tmp.duration); renderList(); });
  });
  if (songs.length && !audio.src) playSong(0); else renderList();
  fileInput.value = '';
});

// Play/Pause
playBtn.addEventListener('click', () => {
  if (!songs.length) return;
  audio.paused ? audio.play() : audio.pause();
});

audio.addEventListener('play', () => {
  playBtn.classList.replace('paused','playing');
  playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
  albumArt.classList.add('playing');
  document.querySelectorAll('.bar').forEach(b=>b.classList.add('playing'));
});
audio.addEventListener('pause', () => {
  playBtn.classList.replace('playing','paused');
  playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
  albumArt.classList.remove('playing');
  document.querySelectorAll('.bar').forEach(b=>b.classList.remove('playing'));
});

// Progress - touch & click support
function seek(e) {
  const rect = progressBar.getBoundingClientRect();
  const x = (e.touches?.[0]?.clientX ?? e.clientX) - rect.left;
  const pct = Math.max(0, Math.min(1, x / rect.width));
  if (audio.duration) audio.currentTime = pct * audio.duration;
}
progressBar.addEventListener('click', seek);
progressBar.addEventListener('touchstart', seek, {passive:true});
progressBar.addEventListener('touchmove', seek, {passive:true});

audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  progressFill.style.width = pct + '%';
  currentTimeEl.textContent = fmt(audio.currentTime);
  totalTimeEl.textContent = fmt(audio.duration);
});

// Next / Prev
const nextSong = () => {
  if (!songs.length) return;
  playSong(shuffle ? Math.floor(Math.random()*songs.length) : (currentIndex+1)%songs.length);
};
const prevSong = () => {
  if (!songs.length) return;
  if (audio.currentTime > 3) { audio.currentTime=0; return; }
  playSong((currentIndex-1+songs.length)%songs.length);
};
document.getElementById('nextBtn').addEventListener('click', nextSong);
document.getElementById('prevBtn').addEventListener('click', prevSong);
audio.addEventListener('ended', () => repeat ? (audio.currentTime=0, audio.play()) : nextSong());

// Shuffle / Repeat
shuffleBtn.addEventListener('click', () => { shuffle=!shuffle; shuffleBtn.classList.toggle('active',shuffle); });
repeatBtn.addEventListener('click', () => { repeat=!repeat; repeatBtn.classList.toggle('active',repeat); });

// Like
likeBtn.addEventListener('click', () => {
  liked.has(currentIndex) ? liked.delete(currentIndex) : liked.add(currentIndex);
  likeBtn.classList.toggle('liked', liked.has(currentIndex));
});

// Volume - touch support
volumeSlider.addEventListener('input', () => {
  audio.volume = volumeSlider.value / 100;
  volumeSlider.style.setProperty('--vol', volumeSlider.value+'%');
});
audio.volume = 0.7;

// Tabs
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    const t = tab.dataset.tab;
    document.getElementById('view-player').classList.toggle('active', t==='player');
    document.getElementById('view-list').classList.toggle('active', t==='list');
  });
});

// Bottom nav
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
    item.classList.add('active');
    const nav = item.dataset.nav;
    const showPlayer = nav !== 'list';
    document.getElementById('view-player').classList.toggle('active', showPlayer);
    document.getElementById('view-list').classList.toggle('active', !showPlayer);
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', showPlayer ? i===0 : i===1));
  });
});

// Swipe between player and list
let touchStartX = 0;
document.querySelector('.main').addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, {passive:true});
document.querySelector('.main').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) < 60) return;
  const tabs = document.querySelectorAll('.tab');
  if (dx < 0) tabs[1].click(); else tabs[0].click();
}, {passive:true});

// Media Session API (controles en la notificación de Android)
if ('mediaSession' in navigator) {
  navigator.mediaSession.setActionHandler('play', () => audio.play());
  navigator.mediaSession.setActionHandler('pause', () => audio.pause());
  navigator.mediaSession.setActionHandler('nexttrack', nextSong);
  navigator.mediaSession.setActionHandler('previoustrack', prevSong);
  audio.addEventListener('play', () => {
    if (!songs.length) return;
    navigator.mediaSession.metadata = new MediaMetadata({
      title: songs[currentIndex]?.name || 'Canción',
      artist: songs[currentIndex]?.artist || 'Artista desconocido',
      album: 'Lark Player'
    });
  });
}

renderList();
</script>
</body>
</html>
